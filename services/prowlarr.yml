services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ${CONFIG_ROOT}/Prowlarr/Config:/config
      - ${CONFIG_ROOT}/Prowlarr/Backup:/data/Backup
      - ${DOWNLOADS_ROOT}:/data/downloads
    ports:
      - 9697:9696
    restart: unless-stopped
    networks:
      - arrs
