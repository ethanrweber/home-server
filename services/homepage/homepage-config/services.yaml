---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Media:
    - Plex:
          icon: plex.png
          href: https://app.plex.tv/
          description: Plex is a media server that organizes your personal media and streams it to your devices.
          ping: "{{HOMEPAGE_VAR_PLEX_URL}}"
          widgets:
            - type: plex
              url: "{{HOMEPAGE_VAR_PLEX_URL}}"
              key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
              fields: [ "movies", "tv" ]
            - type: tautulli
              url: http://ts-tautulli:8181
              key: "{{HOMEPAGE_VAR_TAUTULLI_KEY}}"
              enableUser: true # optional, defaults to false
              showEpisodeNumber: true # optional, defaults to false
              expandOneStreamToTwoRows: false # optional, defaults to true

    - Tautulli:
          icon: tautulli.png
          href: https://tautulli.{{HOMEPAGE_VAR_TS_DOMAIN}}/
          description: Media Monitoring for Plex
          ping: https://ts-tautulli:8181

    - Komga:
          icon: komga.png
          href: https://komga.{{HOMEPAGE_VAR_TS_DOMAIN}}/
          description: Komga is a comics/manga server
          ping: http://ts-komga:25600
          widget:
              type: komga
              url: http://ts-komga:25600
              username: "{{HOMEPAGE_VAR_KOMGA_USERNAME}}"
              password: "{{HOMEPAGE_VAR_KOMGA_PASSWORD}}"

    - Calibre-Web-Automated:
          icon: calibre-web.png
          href: https://calibre.{{HOMEPAGE_VAR_TS_DOMAIN}}/
          description: Calibre-Web-Automated is a web-based e-book library manager
          ping: http://ts-calibre-web-automated:8083
          widget:
              type: calibreweb
              url: http://ts-calibre-web-automated:8083
              username: "{{HOMEPAGE_VAR_CALIBRE_USERNAME}}"
              password: "{{HOMEPAGE_VAR_CALIBRE_PASSWORD}}"

- Media Automation (Tailnet Only):
    - Sonarr:
          icon: sonarr.png
          href: http://home-server.{{HOMEPAGE_VAR_TS_DOMAIN}}:8989
          description: Sonarr is a TV series management tool that automates the process of finding, downloading, and organizing TV shows.
          ping: http://ts-remote-access:8989
          widget:
              type: sonarr
              url: http://ts-remote-access:8989
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
              enableQueue: true # optional, defaults to false

    - Radarr:
          icon: radarr.png
          href: http://home-server.{{HOMEPAGE_VAR_TS_DOMAIN}}:7878
          description: Radarr is a movie management tool that automates the process of finding, downloading, and organizing movies.
          ping: http://ts-remote-access:7878
          widget:
              type: radarr
              url: http://ts-remote-access:7878
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
              enableQueue: true # optional, defaults to false

    - Shelfmark:
          icon: shelfmark.png
          href: https://shelfmark.{{HOMEPAGE_VAR_TS_DOMAIN}}/
          description: Shelfmark is a book downloading tool
          ping: http://ts-shelfmark:8084

- Infrastructure (Tailnet Only):
    - Portainer:
          icon: portainer.png
          href: https://portainer.{{HOMEPAGE_VAR_TS_DOMAIN}}/
          description: Portainer is a Docker management UI
          ping: http://ts-portainer:9000
          widget:
              type: portainer
              url: http://ts-portainer:9000
              env: "{{HOMEPAGE_VAR_PORTAINER_ENV}}"
              key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
              fields: ["running", "stopped", "total"]
