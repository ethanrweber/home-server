services:
  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    environment:
      PUID: 1000
      PGID: 1000
    ports:
      - 8084:8084
    restart: unless-stopped
    volumes:
      # App configuration
      - ${CONFIG_ROOT}/Shelfmark/Config:/config
      # Destination for book downloads - auto ingest in CWA
      - ${CONFIG_ROOT}/Calibre-Web-Automated/BookIngest:/book-ingest
      # Required for torrent / usenet - path must match your download client's volume exactly
      - ${DOWNLOADS_ROOT}:/data/downloads
