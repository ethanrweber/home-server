services:
  ts-sonarr:
    extends:
      file: ../tailscale-sidecar.yml
      service: tailscale-sidecar
    container_name: ts-sonarr
    hostname: sonarr
    volumes:
      - ${CONFIG_ROOT}/ts-sonarr/state:/var/lib/tailscale
      - ./ts-sonarr-config:/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ${CONFIG_ROOT}/Sonarr/Config:/config
      - ${CONFIG_ROOT}/Sonarr/Backup:/data/Backup
      - ${MEDIA_ROOT}/tvshows:/data/tvshows
      - ${DOWNLOADS_ROOT}:/data/downloads
    restart: unless-stopped
    network_mode: service:ts-sonarr
    depends_on:
      ts-sonarr:
        condition: service_healthy
