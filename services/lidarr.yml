services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ${CONFIG_ROOT}/Lidarr/Config:/config
      - ${MEDIA_ROOT}/music:/data/musicfolder
      - ${DOWNLOADS_ROOT}:/data/downloads
      - ${CONFIG_ROOT}/Lidarr/Backup:/data/Backup
    ports:
      - 8686:8686
    restart: unless-stopped
    networks:
      - arrs
